name = "Mojo"
grammar = "mojo"
path_suffixes = ["mojo", "🔥"]
line_comments = ["# "]
tab_size = 4
autoclose_before = ";:.,=}])"
collapsed_placeholder = "# ..."
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
    { start = "r\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
    { start = "r'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]
completion_query_characters = [".", ":"]
